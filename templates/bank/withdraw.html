{% extends "base.html" %}
{% block title %}Withdraw Funds | UST Bank{% endblock %}

{% block content %}
<div class="card" style="max-width:500px; margin:auto; padding:2rem;">
  <h2 style="text-align:center; margin-bottom:1.5rem;">Withdraw Funds</h2>
  <form method="post" style="display:flex; flex-direction:column; gap:1rem;">
    {% csrf_token %}
    {% for field in form %}
      <div>
        {{ field.label_tag }}<br>
        {{ field }}
        {% if field.errors %}
          <p style="color:#d9534f; font-size:0.9rem;">{{ field.errors }}</p>
        {% endif %}
      </div>
    {% endfor %}
    <button type="submit" class="button" style="align-self:center; padding:0.75rem 1.5rem;">Withdraw</button>
  </form>
  <p style="text-align:center; margin-top:1.5rem;"><a href="{% url 'bank:balance' %}" class="button secondary">Back to Balance</a></p>
</div>
{% endblock %}
