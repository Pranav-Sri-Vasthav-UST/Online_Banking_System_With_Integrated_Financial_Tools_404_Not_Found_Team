{% extends "base.html" %}
{% block title %}Account Balance | UST Bank{% endblock %}

{% block content %}
<div class="card" style="text-align:center; max-width:400px; margin:auto; padding:2rem;">
  <h2>Your Account Balance</h2>
  <p style="font-size:2rem; margin:1rem 0; color:#4e54c8;"><strong>₹ {{ balance }}</strong></p>
  <div style="display:flex; flex-direction:column; gap:1rem;">
    <a href="{% url 'bank:deposit' %}" class="button">Deposit Funds</a>
    <a href="{% url 'bank:withdraw' %}" class="button">Withdraw Funds</a>
    <a href="{% url 'accounts:profile' %}" class="button secondary">Back to Dashboard</a>
  </div>
</div>
{% endblock %}
