{% extends "base.html" %}
{% block title %}Log In | UST Bank{% endblock %}

{% block content %}
<div class="card" style="max-width:400px; margin:auto;">
  <h2 style="margin-bottom:1rem; text-align:center;">Log In</h2>
  <form method="post" style="display:flex; flex-direction:column; gap:1rem;">
    {% csrf_token %}
    {% for field in form %}
      <div>
        {{ field.label_tag }}<br>
        {{ field }}
        {% if field.errors %}
          <p style="color:#d9534f; font-size:0.9rem; margin-top:0.25rem;">{{ field.errors }}</p>
        {% endif %}
      </div>
    {% endfor %}
    <button type="submit" style="align-self:center;">Log in</button>
  </form>
  <p style="margin-top:1rem; text-align:center; font-size:0.9rem;">
    New user? <a href="{% url 'accounts:register' %}" style="color:#0077cc; text-decoration:none;">Register here</a>
  </p>
</div>
{% endblock %}
